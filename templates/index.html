<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Gratis - Acceso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-image: url("{{ url_for('static', filename='mrx_fondo.jpg') }}");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #0a0a0a;
            color: white; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .card { 
            background: rgba(15, 15, 15, 0.9); 
            backdrop-filter: blur(12px); 
            border: 2px solid #ffcc00; 
            padding: 40px 30px; 
            border-radius: 30px; 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .mrx-trigger {
            width: 90px; height: 90px;
            margin: 0 auto 20px auto;
            cursor: pointer;
            border-radius: 50%;
            border: 3px solid #ffcc00;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.6);
            display: block;
        }
        .mrx-trigger img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }

        h1 { color: #ffcc00; font-size: 1.8em; margin-bottom: 20px; }
        
        input { 
            width: 100%; padding: 14px; margin: 10px 0; 
            border-radius: 12px; border: 1px solid #444; 
            background: rgba(255,255,255,0.05); color: white; outline: none;
        }

        .btn { 
            display: block; width: 100%; padding: 15px; margin-top: 15px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; 
            border: none; cursor: pointer; text-align: center;
        }

        .btn-reg { background: #ffcc00; color: black; }
        .btn-wa { background: #25d366; color: white; }

        /* MODAL DEL MENSAJE */
        #modal-mrx {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            z-index: 99999;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #000;
            border: 3px solid #ffcc00;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 85%;
            box-shadow: 0 0 60px rgba(255, 204, 0, 0.5);
        }

        .frase-mrx { 
            color: #ffcc00; 
            font-weight: bold; 
            font-size: 1.5em; 
            line-height: 1.6;
            text-transform: uppercase;
        }

        .unidad {
            display: block;
            margin-top: 15px;
            font-size: 0.85em;
            color: #aaa;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="modal-mrx" onclick="cerrarMensaje()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <p class="frase-mrx">
                🇻🇪<br>
                LEALES SIEMPRE,<br>
                TRAIDORES NUNCA
                <span class="unidad">COMPAÑÍA 3101 CIA COMANDO</span>
            </p>
            <button onclick="cerrarMensaje()" class="btn btn-reg" style="margin-top: 30px; width: auto; padding: 10px 40px;">ENTENDIDO</button>
        </div>
    </div>

    <div class="card">
        <div class="mrx-trigger" id="boton-frase">
            <img src="{{ url_for('static', filename='mrx_fondo.jpg') }}">
        </div>

        <h1>📶 Wi-Fi GRATIS</h1>

        {% if not registro_exitoso %}
        <p style="margin-bottom: 15px; color: #ccc;">Ingrese sus datos para conectar</p>
        <form action="/registrar" method="POST">
            <input type="text" name="nombre" placeholder="Nombre Completo" required>
            <input type="text" name="cedula" placeholder="Cédula de Identidad" required>
            <input type="text" name="telefono" placeholder="Número de Teléfono" required>
            <button type="submit" class="btn btn-reg">ACCEDER AL SERVICIO</button>
        </form>
        {% else %}
        <div style="background: rgba(255,204,0,0.1); padding: 20px; border-radius: 15px; border: 1px dashed #ffcc00; text-align: left; margin-top: 10px;">
            <p style="font-size: 0.9em; margin-bottom: 10px;"><b>DATOS PAGO MÓVIL:</b></p>
            <p>Banco: <b>Venezuela</b></p>
            <p>Teléfono: <span style="color:#0f0; font-family: monospace; font-weight: bold;">04149019748</span></p>
            <p>Cédula: <span style="color:#0f0; font-family: monospace; font-weight: bold;">30.540.884</span></p>
        </div>
        <a href="https://wa.me/584149019748?text=Pago%20realizado" class="btn btn-reg">✅ ENVIAR CAPTURE</a>
        <a href="https://wa.me/584149019748?text=Soporte" class="btn btn-wa">💬 AYUDA</a>
        {% endif %}
    </div>

    <script>
        document.getElementById('boton-frase').addEventListener('click', function() {
            document.getElementById('modal-mrx').style.display = 'flex';
        });

        function cerrarMensaje() {
            document.getElementById('modal-mrx').style.display = 'none';
        }
    </script>

</body>
</html>
